name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore VendingAdSolution/VendingAdSolution.sln

      - name: Build
        run: dotnet build VendingAdSolution/VendingAdSolution.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VendingAdSolution/VendingAdSolution.sln --configuration Release --no-build
