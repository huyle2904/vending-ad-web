services:
  - type: web
    name: vending-ad-system
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/live
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DatabaseProvider
        value: Postgres
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: vending-ad-db
          property: connectionString
      - key: UploadsPath
        value: /data/uploads
      - key: Database__ApplyMigrationsOnStartup
        value: "true"
      - key: Database__EnsureCreatedOnStartup
        value: "false"
      - key: Database__ResetOnStartup
        value: "false"
      - key: Database__ResetSchemaOnStartup
        value: "false"
      - key: Seed__EnableDemoData
        value: "true"
      - key: Seed__AllowDemoDataOutsideDevelopment
        value: "true"

databases:
  - name: vending-ad-db
    plan: free
    databaseName: vendingad
    user: vendingad
