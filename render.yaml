services:
  - type: web
    name: vending-ad-system
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /account/login
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        value: Data Source=/data/vendingad.db
      - key: UploadsPath
        value: /data/uploads
databases: []
