services:
  - type: web
    name: vending-ad-system
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/live
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: vending-ad-db
          property: connectionString
      - key: UploadsPath
        value: /data/uploads
      - key: Database__ApplyMigrationsOnStartup
        value: "true"
      - key: Redis__Enabled
        value: "false"
      - key: RabbitMQ__Enabled
        value: "false"

databases:
  - name: vending-ad-db
    plan: basic-256mb
    databaseName: vendingad
    user: vendingad
    postgresMajorVersion: "16"
